<!DOCTYPE html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <meta name="theme-color" content="#060b16" />
    <meta name="description" content="Thank you for contacting Webzenx." />
    <title>Thank You | Webzenx</title>
    <link rel="canonical" href="https://webzenx.vercel.app/thanks" />
    <link rel="icon" href="/logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="bg-grid"></div>
      <div class="bg-orb bg-orb-one"></div>
      <div class="bg-orb bg-orb-two"></div>
      <main>
        <section class="section page-hero">
          <div class="container">
            <div class="page-hero-shell glass-card reveal">
              <div class="page-hero-copy">
                <div class="eyebrow">Thank You</div>
                <h1>Your enquiry has been submitted.</h1>
                <p>Webzenx has received your details. If email forwarding is active, the message should be delivered to the business inbox.</p>
                <div class="page-hero-actions">
                  <a class="button button-primary" href="/">Back to Home</a>
                  <a class="button button-secondary" href="/contact">Send Another Enquiry</a>
                </div>
              </div>
              <div class="page-hero-art">
                <div class="art-glow"></div>
                <div class="art-card"></div>
                <div class="art-float glass-card">
                  <p>Next step</p>
                  <strong>You can also call directly at +91 87969 16781.</strong>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
